<main class="container">
  <div class="page-header">
    <h1>Gestion de projet</h1>
    <button class="btn-new-task" (click)="showCreateModal.set(true)">+ Nouvelle tâche</button>
  </div>

  @if (loading()) {
    <p class="state-message">Chargement...</p>
  } @else if (error()) {
    <p class="state-message error">{{ error() }}</p>
  } @else {
    <app-kanban-board
      [tasks]="tasks()"
      (editRequested)="taskToEdit.set($event)"
      (deleteRequested)="taskToDelete.set($event)"
    />
  }
</main>

@if (showCreateModal()) {
  <app-modal title="Nouvelle tâche" (closed)="showCreateModal.set(false)">
    <app-task-form (taskCreated)="onTaskCreated($event)" />
  </app-modal>
}

@if (taskToEdit()) {
  <app-modal title="Modifier la tâche" (closed)="taskToEdit.set(null)">
    <app-task-form [task]="taskToEdit()" (taskUpdated)="onTaskUpdated($event)" />
  </app-modal>
}

@if (taskToDelete()) {
  <app-confirm-modal
    message="Supprimer « {{ taskToDelete()!.title }} » ? Cette action est irréversible."
    confirmLabel="Supprimer"
    (confirmed)="confirmDelete()"
    (cancelled)="taskToDelete.set(null)"
  />
}
