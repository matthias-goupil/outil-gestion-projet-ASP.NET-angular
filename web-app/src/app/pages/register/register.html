<div class="auth-container">
  <div class="auth-card">
    <h1>Créer un compte</h1>

    @if (error()) {
      <p class="auth-error">{{ error() }}</p>
    }

    <form (ngSubmit)="submit()">
      <div class="form-row">
        <div class="form-field">
          <label for="firstName">Prénom <span class="required">*</span></label>
          <input id="firstName" type="text" [(ngModel)]="firstName" name="firstName" placeholder="Prénom" required />
        </div>
        <div class="form-field">
          <label for="lastName">Nom <span class="required">*</span></label>
          <input id="lastName" type="text" [(ngModel)]="lastName" name="lastName" placeholder="Nom" required />
        </div>
      </div>
      <div class="form-field">
        <label for="email">Email <span class="required">*</span></label>
        <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="vous@exemple.com" required />
      </div>
      <div class="form-field">
        <label for="password">Mot de passe <span class="required">*</span></label>
        <input id="password" type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required />
      </div>
      <button type="submit" [disabled]="!firstName.trim() || !lastName.trim() || !email || !password || submitting()">
        {{ submitting() ? 'Création...' : 'Créer mon compte' }}
      </button>
    </form>

    <p class="auth-link">Déjà un compte ? <a routerLink="/login">Se connecter</a></p>
  </div>
</div>
