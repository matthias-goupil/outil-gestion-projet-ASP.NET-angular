<form class="task-form" (ngSubmit)="submit()">
  @if (error) {
    <p class="form-error">{{ error }}</p>
  }

  <div class="form-field">
    <label for="title">Titre <span class="required">*</span></label>
    <input
      id="title"
      type="text"
      [(ngModel)]="title"
      name="title"
      placeholder="Nom de la tâche"
      required
    />
  </div>

  <div class="form-field">
    <label for="content">Description</label>
    <textarea
      id="content"
      [(ngModel)]="content"
      name="content"
      placeholder="Description optionnelle"
      rows="3"
    ></textarea>
  </div>

  @if (members().length > 0) {
    <div class="form-field">
      <label>Assignés</label>
      <div class="assignee-picker">
        @for (member of members(); track member.id) {
          <button
            type="button"
            class="assignee-chip"
            [class.selected]="isAssigned(member.id)"
            (click)="toggleAssignee(member.id)"
            [title]="member.email"
          >
            <span class="chip-avatar">{{ avatarLetter(member) }}</span>
            <span class="chip-email">{{ displayName(member) }}</span>
          </button>
        }
      </div>
    </div>
  }

  <button type="submit" [disabled]="!title.trim() || submitting">
    {{ submitting ? 'Enregistrement...' : isEditMode ? 'Enregistrer' : 'Créer la tâche' }}
  </button>
</form>
