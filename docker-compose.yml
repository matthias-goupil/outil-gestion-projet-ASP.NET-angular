services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web-app

  api:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    working_dir: /app
    volumes:
      - ./api/api:/app
      - api_obj:/app/obj
      - api_bin:/app/bin
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DOTNET_USE_POLLING_FILE_WATCHER=true
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=gestion_projet;Username=postgres;Password=postgres
    depends_on:
      db:
        condition: service_healthy
    command: /bin/bash -c "dotnet restore && dotnet watch run --non-interactive --urls http://0.0.0.0:8080"

  web-app:
    image: node:22
    working_dir: /app
    volumes:
      - ./web-app:/app
      - web_app_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: /bin/bash -c "npm install && npx ng serve --host 0.0.0.0 --poll 1000 --allowed-hosts"

  db:
    image: postgres:17
    environment:
      - POSTGRES_DB=gestion_projet
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  api_obj:
  api_bin:
  pg_data:
  web_app_node_modules: